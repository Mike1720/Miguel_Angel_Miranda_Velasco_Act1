<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de area y perimetro de triangulos equilateros</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            text-align: center;
            padding: 50px;
        }

        h1 {
            color: #333;
        }

        form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }


    </style>
</head>

<body>
<h1>Calculadora de area y perimetro de triangulos equilateros</h1>
<form action="index.jsp" method="post">
    <label for="base">Base (cm):</label>
    <input type="text" id="base" name="base" required>
    <label for="altura">Altura (cm):</label>
    <input type="text" id="altura" name="altura" required>
    <input type="submit" value="Calcular">
</form>
</body>
</html>
